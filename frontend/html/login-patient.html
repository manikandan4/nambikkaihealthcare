<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Login - Nambikkai Healthcare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body class="auth-body">

  <div class="auth-layout">
    <aside class="auth-aside">
      <a href="index.html" class="text-white-50 text-decoration-none small"><i class="bi bi-arrow-left"></i> All portals</a>
      <i class="bi bi-heart-pulse fs-3 text-primary my-3 d-block"></i>
      <h2 class="h5 fw-semibold">Patient Portal</h2>
      <p class="small opacity-75">View-only access to your profile, appointments, and records.</p>
      <p class="small opacity-50 mt-auto mb-0">Book appointments at the nurse desk.</p>
    </aside>

    <section class="auth-form-panel">
      <h1 class="h5 fw-semibold mb-1">Patient sign in</h1>
      <p class="text-muted small mb-4">Select your name and confirm your date of birth.</p>

      <div id="loginError" class="alert alert-danger d-none"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="patientId" class="form-label">Your Name</label>
          <select class="form-select" id="patientId" required>
            <option value="">Loading patients…</option>
          </select>
        </div>
        <div class="mb-4">
          <label for="dateOfBirth" class="form-label">Date of Birth</label>
          <input type="date" class="form-control" id="dateOfBirth" required>
          <div class="form-text">Must match the date of birth in your patient record.</div>
        </div>
        <button type="submit" class="btn btn-primary btn-sm w-100">Sign in</button>
      </form>
    </section>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/login-patient.js"></script>
</body>
</html>
