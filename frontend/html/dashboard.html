<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Nambikkai Healthcare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body class="app-body">

  <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="app-shell">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-hospital me-2"></i>Nambikkai Healthcare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav me-auto" id="navLinks"></ul>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white-50 small" id="userBadge"></span>
          <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <header class="page-banner py-3">
    <div class="app-shell">
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <h1 class="page-title h5 fw-semibold mb-1">Dashboard</h1>
          <p class="page-subtitle text-muted small mb-0">Overview and quick navigation</p>
        </div>
        <div id="pageActions"></div>
      </div>
    </div>
  </header>

  <main class="flex-grow-1 py-3">
    <div class="app-shell app-page" id="dashboardContent"></div>
  </main>

  <footer class="app-footer py-2">
    <div class="app-shell d-flex justify-content-between align-items-center">
      <span>Nambikkai Healthcare &copy; 2026</span>
      <span id="apiStatus" class="small">…</span>
    </div>
  </footer>

  <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
  <div id="modalContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/permissions.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/data-filter.js"></script>
  <script src="../js/pages/dashboard-controller.js"></script>
</body>
</html>
