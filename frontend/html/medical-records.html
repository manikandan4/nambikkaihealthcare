<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Records - Nambikkai Healthcare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body class="app-body">

  <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="app-shell">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-hospital me-2"></i>Nambikkai Healthcare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav me-auto" id="navLinks"></ul>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white-50 small" id="userBadge"></span>
          <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <header class="page-banner py-3">
    <div class="app-shell">
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <h1 class="page-title h5 fw-semibold mb-1">Medical Records</h1>
          <p class="page-subtitle text-muted small mb-0">Visit records and diagnoses</p>
        </div>
        <div id="pageActions"></div>
      </div>
    </div>
  </header>

  <main class="flex-grow-1 py-3">
    <div class="app-shell app-page">

    <div id="readOnlyNotice" class="alert alert-light border d-none small"></div>

    <section id="formSection" class="card border mb-3 d-none">
      <div class="card-header py-2 small fw-medium bg-white" id="formTitle">Record Diagnosis</div>
      <div class="card-body py-3">
        <form id="recordForm">
          <p class="small text-muted fw-medium mb-2">Visit information</p>
          <div class="row g-2 mb-3">
            <div class="col-md-6" id="patientFieldGroup">
              <label for="patientId" class="form-label">Patient <span class="text-danger">*</span></label>
              <select class="form-select form-select-sm" id="patientId" required></select>
            </div>
            <div class="col-md-6" id="doctorFieldGroup">
              <label for="doctorId" class="form-label">Doctor <span class="text-danger">*</span></label>
              <select class="form-select form-select-sm" id="doctorId" required></select>
            </div>
            <div class="col-md-4">
              <label for="visitDate" class="form-label">Visit date <span class="text-danger">*</span></label>
              <input type="date" class="form-control form-control-sm" id="visitDate" required>
            </div>
          </div>
          <p class="small text-muted fw-medium mb-2">Clinical notes</p>
          <div class="row g-2 mb-3">
            <div class="col-12">
              <label for="symptoms" class="form-label">Symptoms</label>
              <textarea class="form-control form-control-sm" id="symptoms" rows="2" placeholder="Patient-reported symptoms"></textarea>
            </div>
            <div class="col-12">
              <label for="diagnosis" class="form-label">Diagnosis <span class="text-danger">*</span></label>
              <textarea class="form-control form-control-sm" id="diagnosis" rows="2" required placeholder="Clinical diagnosis"></textarea>
            </div>
            <div class="col-12">
              <label for="notes" class="form-label">Notes</label>
              <textarea class="form-control form-control-sm" id="notes" rows="2" placeholder="Treatment plan, follow-up, etc."></textarea>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary btn-sm" id="submitBtn">Save</button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="cancelBtn">Cancel</button>
          </div>
        </form>
      </div>
    </section>

    <section id="searchBar" class="mb-3 d-none">
      <div class="row g-2 align-items-center">
        <div class="col-md-5">
          <input type="search" class="form-control form-control-sm" id="searchInput" placeholder="Search by patient or diagnosis…">
        </div>
        <div class="col-auto">
          <button class="btn btn-outline-secondary btn-sm" id="resetSearch">Reset</button>
        </div>
      </div>
    </section>

    <div id="loadingState" class="text-center py-3 text-muted small">Loading records…</div>
    <div id="errorState" class="alert alert-danger py-2 small d-none"></div>

    <section id="tableSection" class="card border d-none">
      <div class="table-responsive">
        <table class="table table-sm table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Patient</th>
              <th>Doctor</th>
              <th>Visit</th>
              <th>Diagnosis</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

    <section id="emptyState" class="card border d-none"></section>

    </div>
  </main>

  <footer class="app-footer py-2">
    <div class="app-shell d-flex justify-content-between align-items-center">
      <span>Nambikkai Healthcare &copy; 2026</span>
      <span id="apiStatus" class="small">…</span>
    </div>
  </footer>

  <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
  <div id="modalContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/permissions.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/data-filter.js"></script>
  <script src="../js/pages/records-controller.js"></script>
</body>
</html>
