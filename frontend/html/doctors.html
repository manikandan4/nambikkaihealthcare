<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctors - Nambikkai Healthcare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body class="app-body">

  <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="app-shell">
      <a class="navbar-brand" href="../html/dashboard.html"><i class="bi bi-hospital me-2"></i>Nambikkai Healthcare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav me-auto" id="navLinks"></ul>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white-50 small" id="userBadge"></span>
          <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <header class="page-banner py-3">
    <div class="app-shell">
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <h1 class="page-title h5 fw-semibold mb-1">Doctors</h1>
          <p class="page-subtitle text-muted small mb-0">Manage physician profiles</p>
        </div>
        <div id="pageActions"></div>
      </div>
    </div>
  </header>

  <main class="flex-grow-1 py-3">
    <div class="app-shell app-page">

    <div id="readOnlyNotice" class="alert alert-light border d-none small"></div>

    <section id="formSection" class="card border mb-3 d-none">
      <div class="card-header py-2 small fw-medium bg-white" id="formTitle">Add Doctor</div>
      <div class="card-body py-3">
        <form id="doctorForm">
          <div class="row g-2 mb-3">
            <div class="col-md-6">
              <label for="firstName" class="form-label">First name <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-sm" id="firstName" required>
            </div>
            <div class="col-md-6">
              <label for="lastName" class="form-label">Last name <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-sm" id="lastName" required>
            </div>
            <div class="col-md-6">
              <label for="specialty" class="form-label">Specialty <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-sm" id="specialty" placeholder="e.g. Cardiology" required>
            </div>
            <div class="col-md-6">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control form-control-sm" id="email" placeholder="doctor@hospital.com">
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary btn-sm" id="submitBtn">Save</button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="cancelBtn">Cancel</button>
          </div>
        </form>
      </div>
    </section>

    <section id="searchBar" class="mb-3 d-none">
      <div class="row g-2 align-items-center">
        <div class="col-md-5">
          <input type="search" class="form-control form-control-sm" id="searchInput" placeholder="Search by name or specialty…">
        </div>
        <div class="col-auto">
          <button class="btn btn-outline-secondary btn-sm" id="resetSearch">Reset</button>
        </div>
      </div>
    </section>

    <div id="loadingState" class="text-center py-3 text-muted small">Loading doctors…</div>
    <div id="errorState" class="alert alert-danger py-2 small d-none"></div>

    <section id="tableSection" class="card border d-none">
      <div class="table-responsive">
        <table class="table table-sm table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Specialty</th>
              <th>Email</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

    <section id="emptyState" class="card border d-none"></section>

    </div>
  </main>

  <footer class="app-footer py-2">
    <div class="app-shell d-flex justify-content-between align-items-center">
      <span>Nambikkai Healthcare &copy; 2026</span>
      <span id="apiStatus" class="small">…</span>
    </div>
  </footer>

  <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
  <div id="modalContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/permissions.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/pages/doctors-controller.js"></script>
</body>
</html>
