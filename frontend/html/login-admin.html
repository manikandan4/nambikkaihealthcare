<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nurse Station Login - Nambikkai Healthcare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body class="auth-body">

  <div class="auth-layout">
    <aside class="auth-aside">
      <a href="index.html" class="text-white-50 text-decoration-none small"><i class="bi bi-arrow-left"></i> All portals</a>
      <i class="bi bi-clipboard2-pulse fs-3 text-primary my-3 d-block"></i>
      <h2 class="h5 fw-semibold">Nurse Station</h2>
      <p class="small opacity-75">Front desk — register patients and schedule appointments.</p>
      <p class="small opacity-50 mt-auto mb-0">Demo: admin / admin123</p>
    </aside>

    <section class="auth-form-panel">
      <h1 class="h5 fw-semibold mb-1">Nurse sign in</h1>
      <p class="text-muted small mb-4">Hospital staff credentials.</p>
      <div id="loginError" class="alert alert-danger d-none"></div>
      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" value="admin" required>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-sm w-100">Sign in</button>
      </form>
    </section>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/login-admin.js"></script>
</body>
</html>
