<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Login - Nambikkai Healthcare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body class="auth-body">

  <div class="auth-layout">
    <aside class="auth-aside">
      <a href="../html/index.html" class="text-white-50 text-decoration-none small"><i class="bi bi-arrow-left"></i> All portals</a>
      <i class="bi bi-person-badge fs-3 text-primary my-3 d-block"></i>
      <h2 class="h5 fw-semibold">Doctor Portal</h2>
      <p class="small opacity-75">See your schedule, record diagnoses, and place clinical orders.</p>
      <p class="small opacity-50 mt-auto mb-0">Verify with your registered email.</p>
    </aside>

    <section class="auth-form-panel">
      <h1 class="h5 fw-semibold mb-1">Doctor sign in</h1>
      <p class="text-muted small mb-4">Select your name and confirm your registered email.</p>

      <div id="loginError" class="alert alert-danger d-none"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="doctorId" class="form-label">Your Name</label>
          <select class="form-select" id="doctorId" required>
            <option value="">Loading doctors…</option>
          </select>
        </div>
        <div class="mb-4">
          <label for="email" class="form-label">Registered Email</label>
          <input type="email" class="form-control" id="email" placeholder="doctor@hospital.com" required autocomplete="email">
          <div class="form-text">Must match the email in your doctor profile.</div>
        </div>
        <button type="submit" class="btn btn-primary btn-sm w-100">Sign in</button>
      </form>
    </section>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/login-doctor.js"></script>
</body>
</html>
